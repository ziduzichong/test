{% extends "base.html" %}
{% block title %}上传文件{% endblock %}
{% block content %}
<div class="page-header"><h1>上传文件</h1></div>
<div class="card" style="max-width:600px;margin:0 auto;padding:24px">
<form method="post" enctype="multipart/form-data" id="uploadForm">
    {% csrf_token %}

    <div class="form-group">
        <label>分类 <span style="color:var(--danger)">*</span></label>
        <select name="category" class="form-control" required>
            <option value="">请选择分类</option>
            {% for c in categories %}
            <option value="{{ c.0 }}">{{ c.1 }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>描述</label>
        <input type="text" name="description" class="form-control" placeholder="可选">
    </div>

    <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="is_public" style="width:auto">
            公开下载（访客无需登录）
        </label>
    </div>

    <div class="form-group">
        <label>文件 <span style="color:var(--danger)">*</span></label>
        <div id="dropArea" style="border:2px dashed var(--gray-300);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s">
            <div id="dropPlaceholder">
                <div style="font-size:2.5rem;color:var(--gray-400);margin-bottom:8px">📤</div>
                <p style="color:var(--gray-500)">点击或拖拽文件到此处</p>
                <p style="font-size:.8rem;color:var(--gray-400)">最大 2GB</p>
            </div>
            <div id="dropFile" style="display:none">
                <p style="font-weight:500" id="dropFileName"></p>
                <p style="font-size:.85rem;color:var(--gray-400)" id="dropFileSize"></p>
            </div>
        </div>
        <input type="file" name="file" id="realFileInput" style="display:none">
    </div>

    <div class="form-group" id="sha256Box" style="display:none">
        <label>SHA256 校验值 <span style="color:var(--gray-400);font-weight:400">（可执行文件必填）</span></label>
        <input type="text" name="sha256" class="form-control" placeholder="64位十六进制字符串">
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%">上传</button>
</form>
</div>

<script>
(function() {
    var dropArea = document.getElementById('dropArea');
    var fileInput = document.getElementById('realFileInput');
    var placeholder = document.getElementById('dropPlaceholder');
    var fileInfo = document.getElementById('dropFile');
    var fileName = document.getElementById('dropFileName');
    var fileSize = document.getElementById('dropFileSize');
    var shaBox = document.getElementById('sha256Box');
    var exts = ['exe','msi','apk','deb','rpm'];

    function showFile(file) {
        placeholder.style.display = 'none';
        fileInfo.style.display = '';
        fileName.textContent = file.name;
        fileSize.textContent = (file.size / 1048576).toFixed(1) + ' MB';
        var ext = file.name.split('.').pop().toLowerCase();
        shaBox.style.display = (exts.indexOf(ext) >= 0) ? '' : 'none';
    }

    dropArea.addEventListener('click', function() { fileInput.click(); });

    dropArea.addEventListener('dragover', function(e) { e.preventDefault(); dropArea.style.borderColor = 'var(--primary)'; dropArea.style.background = 'var(--primary-light)'; });
    dropArea.addEventListener('dragleave', function() { dropArea.style.borderColor = ''; dropArea.style.background = ''; });
    dropArea.addEventListener('drop', function(e) {
        e.preventDefault();
        dropArea.style.borderColor = ''; dropArea.style.background = '';
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            showFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', function() {
        if (this.files.length) showFile(this.files[0]);
    });
})();
</script>
{% endblock %}
